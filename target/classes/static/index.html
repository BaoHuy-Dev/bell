<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Buzzer System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Quiz Buzzer</h1>
        </header>

        <main>
            <!-- Setup Section -->
            <div id="setup-section" class="card glass">
                <h2>Join Game</h2>
                <input type="text" id="player-name" placeholder="Enter your name" autocomplete="off" />
                <button id="connect-btn" class="btn primary">Connect</button>
            </div>

            <!-- Game Section (Hidden initially) -->
            <div id="game-section" class="card glass hidden">
                <h2 id="welcome-message">Ready, <span id="display-name"></span>!</h2>
                
                <div class="status-panel">
                    <p id="winner-display" class="winner-text hidden">Winner: <span id="winner-name"></span></p>
                </div>

                <div class="buzzer-container">
                    <button id="buzz-btn" class="buzzer-btn">BUZZ</button>
                </div>
            </div>

            <!-- Admin Section -->
            <div id="admin-section" class="card glass admin hidden">
                <h3>Host Controls</h3>
                <button id="reset-btn" class="btn secondary">Reset Buzzer</button>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
